<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>HAXY</title>
        <style>
          html {
            background-color: rgba(0, 50, 70, 1.0);
            color: rgba(200, 200, 200, 1.0);
            padding: 10px;
          }

          @font-face {
            font-family: '3270';
            src: url('term.ttf') format('truetype');
          }

          .page {
            font-family: '3270', monospace;
            font-size: 22px;
            line-height: 22px;
            position: relative;
          }

          #grid {
            white-space: pre;
          }

          /* overlay elements share the grid's coordinate system since
             their parent (.page) is the positioning ancestor and the
             grid sits at its top-left. */
          .page input,
          .page button {
            position: absolute;
            font: inherit;
            padding: 0;
            margin: 0;
            outline: none;
            box-sizing: border-box;
          }

          .page input {
            color: inherit;
            background: rgba(0, 50, 70, 1.0);
            border: none;
          }

          /* the TUI cells under the button render the border + label;
             the overlay button stays transparent so they show through
             and just owns the click + form-submit behavior. */
          .page button {
            background: transparent;
            color: transparent;
            border: none;
            cursor: pointer;
          }

          #grid a {
            color: inherit;
            text-decoration: none;
          }

          #grid .clickable {
            cursor: pointer;
          }
        </style>
    </head>
    <body>
      <div class="page">
        <div id="grid">{{{ HAXY_HTML }}}</div>
        <div id="overlay">{{{ HAXY_OVERLAY }}}</div>
      </div>
      <script id="page-data" type="text/plain">{{{ HAXY_JSON }}}</script>
      <script src="script.js"></script>
    </body>
</html>
