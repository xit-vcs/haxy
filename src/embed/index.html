<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>HAXY</title>
        <style>
          html {
            background-color: rgba(0, 50, 70, 1.0);
            color: rgba(200, 200, 200, 1.0);
          }

          /* no body margin because it could push content past the viewport and
             add a window scrollbar */
          body {
            margin: 0;
          }

          @font-face {
            font-family: '3270';
            src: url('/term.ttf') format('truetype');
          }

          .page {
            font-family: '3270', monospace;
            font-size: 22px;
            line-height: 22px;
            position: relative;
          }

          #grid {
            white-space: pre;
            /* positioning context for the top-level .scroll divs */
            position: relative;
          }

          /* each web-native Scroll widget: a box positioned over its viewport
             (left/top/width/height and per-axis overflow come inline, the latter
             from the widget's scroll direction) */
          .scroll {
            position: absolute;
            /* scrollbars are hidden; panes scroll via wheel/trackpad and via
               scrollIntoView on keyboard focus, so a visible bar would only
               cover content. (Firefox / WebKit respectively.) */
            scrollbar-width: none;
          }
          .scroll::-webkit-scrollbar {
            display: none;
          }

          /* render each colored cell-run as an inline-block to prevent
             horizontal seams between rows of the block art. */
          #grid span {
            display: inline-block;
            vertical-align: top;
          }

          /* overlay elements share the grid's coordinate system since
             their parent (.page) is the positioning ancestor and the
             grid sits at its top-left. */
          .page input,
          .page textarea,
          .page button {
            position: absolute;
            font: inherit;
            padding: 0;
            margin: 0;
            outline: none;
            box-sizing: border-box;
          }

          .page input,
          .page textarea {
            color: inherit;
            background: transparent;
            border: none;
          }

          /* the TUI border cells own the frame, so the textarea can't be
             drag-resized past them */
          .page textarea {
            resize: none;
            overflow-y: auto;
          }

          /* the TUI cells under the button render the border + label;
             the overlay button stays transparent so they show through
             and just owns the click + form-submit behavior. */
          .page button {
            background: transparent;
            color: transparent;
            border: none;
            cursor: pointer;
          }

          #grid a {
            color: inherit;
            text-decoration: none;
          }

          #grid .clickable {
            cursor: pointer;
          }
        </style>
    </head>
    <body>
      <div class="page">
        <div id="grid">{{{ HAXY_HTML }}}</div>
        <div id="overlay">{{{ HAXY_OVERLAY }}}</div>
      </div>
      <script id="page-data" type="application/json">{{{ HAXY_JSON }}}</script>
      <script src="/script.js"></script>
    </body>
</html>
